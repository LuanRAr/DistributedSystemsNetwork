version: "3.9"

services:
  actuator:
    build:
      context: .
      dockerfile: dockerfile
    container_name: iot_actuator
    ports:
      - "8983:8983"
    restart: always
    networks:
      - iot_net Se comunicar com o Broker

networks:
  iot_net:
    external: true #indica que a rede já foi criada pelo Broker